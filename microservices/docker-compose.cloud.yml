
services:
  # API Gateway
  api-gateway:
    image: shubham554/ayur-api-gateway:dev4
    build: ./api-gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - identity-service
      - catalog-service
      - order-service
      - ayurbot-service
      - notification-service
    networks:
      - ayur-network

  # Frontend (Next.js)
  frontend:
    image: shubham554/ayur-frontend:dev21
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - ayur-network

  # Identity Service (Node.js)
  identity-service:
    image: shubham554/ayur-identity-service:dev6
    build: ./identity-service
    environment:
      - PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    networks:
      - ayur-network

  # Catalog Service (Node.js)
  catalog-service:
    image: shubham554/ayur-catalog-service:dev9
    build: ./catalog-service
    environment:
      - PORT=3002
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - REDIS_URL=${REDIS_URL}
      - LIBRETRANSLATE_URL=${LIBRETRANSLATE_URL}
    depends_on:
      - redis
    networks:
      - ayur-network

  # Order Service (Node.js)
  order-service:
    image: shubham554/ayur-order-service:dev5
    build: ./order-service
    environment:
      - PORT=3003
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    networks:
      - ayur-network

  # Notification Service (Node.js)
  notification-service:
    image: shubham554/ayur-notification-service:dev3
    build: ./notification-service
    container_name: microservices-notification-service-1
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_PORT=${SMTP_PORT}
    ports:
      - "3004:3004"
    networks:
      - ayur-network

  # AyurBot Service (Python) - Vectorless RAG (BM25)
  ayurbot-service:
    image: shubham554/ayur-ayurbot-service:vectorless-v3
    build: ./ayurbot-vectorless
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=${MONGO_URI}
      - BM25_RERANK_ENABLED=false
    ports:
      - "8000:8000"
    volumes:
      - ./trainingdata-ayurbot:/app/data/pdfs
      - ./ayurbot-vectorless/data/knowledge_chunks.json:/app/data/knowledge_chunks.json
    networks:
      - ayur-network

  # Databases
  # Postgres is on Supabase
  # MongoDB is on Atlas

  # LibreTranslate Service (Free Translation API)
  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      - LT_LOAD_ONLY=en,hi,es,fr,zh
    ports:
      - "5000:5000"
    networks:
      - ayur-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ayur-network

networks:
  ayur-network:
    driver: bridge
